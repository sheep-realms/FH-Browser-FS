<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FH-Browser-FS</title>
    <link rel="stylesheet" href="style/demo.css">
    <script src="class/FHFileSystemEntry.js"></script>
    <script src="class/FHFileEntry.js"></script>
    <script src="class/FHDirectoryEntry.js"></script>
    <script src="class/FHFileView.js"></script>
    <script src="class/FHFileManager.js"></script>
    <script src="script/jquery-3.7.1.min.js"></script>
    <script src="script/demo-icons.js"></script>
</head>
<body>
    <h1>FH-Browser-FS</h1>
    <fieldset class="view-controller">
        <legend>Controller</legend>
        <button id="pick-directory">Pick Directory</button>
        <button id="view-back" disabled>← Back</button>
        <button id="view-refresh" disabled>Refresh</button>
    </fieldset>
    <fieldset class="view-debug">
        <legend>Debug (let demo_print = ?)</legend>
        <button id="view-demo-print-directory" disabled>This Directory</button>
        <button id="view-demo-print-list" disabled>This List</button>
    </fieldset>
    <div id="view-path"></div>
    <div id="file-list"></div>
    <hr>
    <script src="script/demo.js"></script>
</body>
</html>
