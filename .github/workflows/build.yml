name: Build

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: |
                  mkdir -p dist
                  pnpm build

            - name: Upload artifacts
              uses: actions/upload-artifact@v7
              with:
                path: dist/fh-browser-fs.js
                archive: false
            
            - name: Upload artifacts (minify)
              uses: actions/upload-artifact@v7
              with:
                path: dist/fh-browser-fs.min.js
                archive: false